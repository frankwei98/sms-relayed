name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: linux-musl-x64
          - target: aarch64-unknown-linux-musl
            artifact: linux-musl-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set version
        id: version
        run: |
          version="$(git rev-parse --short HEAD)"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: ${{ matrix.target }}

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build
        run: cargo zigbuild --release --locked --target "${{ matrix.target }}"

      - name: Prepare binary
        run: |
          binary="sms-relayed-${VERSION}-${{ matrix.artifact }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sms-relayed" "dist/$binary"
          (cd dist && sha256sum "$binary" > "$binary.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sms-relayed-${{ steps.version.outputs.version }}-${{ matrix.artifact }}
          path: |
            dist/sms-relayed-${{ steps.version.outputs.version }}-${{ matrix.artifact }}
            dist/sms-relayed-${{ steps.version.outputs.version }}-${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          version="$(git rev-parse --short HEAD)"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${VERSION}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes "Automated build for commit $GITHUB_SHA."
          fi
